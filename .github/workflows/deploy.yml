name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          SSH_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload application
        env:
          SSH_HOST: ${{ secrets.HETZNER_HOST }}
          SSH_USER: ${{ secrets.HETZNER_USER }}
        run: |
          rsync -az --delete --exclude '.git/' --exclude '.env' ./ "$SSH_USER@$SSH_HOST:/opt/swine-pwa/"

      - name: Configure and deploy
        env:
          SSH_HOST: ${{ secrets.HETZNER_HOST }}
          SSH_USER: ${{ secrets.HETZNER_USER }}
          DOMAIN: ${{ secrets.DOMAIN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          ENV_CONTENT=$(printf 'DOMAIN=%s\nPOSTGRES_PASSWORD=%s\nJWT_SECRET=%s\nADMIN_PASSWORD=%s\n' "$DOMAIN" "$POSTGRES_PASSWORD" "$JWT_SECRET" "$ADMIN_PASSWORD" | base64 -w0)
          ssh "$SSH_USER@$SSH_HOST" "install -d -m 700 /opt/swine-pwa && echo '$ENV_CONTENT' | base64 -d > /opt/swine-pwa/.env && chmod 600 /opt/swine-pwa/.env && cd /opt/swine-pwa && docker compose -f compose.production.yaml up -d --build --remove-orphans && docker image prune -f"
